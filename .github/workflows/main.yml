name: EMI_Tosca_Automation

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Runs Monday to Friday at 1:30 UTC
    - cron: '30 1 * * 1,2,3,4,5'

jobs:
  build:
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run TOSCA Test
        run: >
          C:\Tosca_Projects\ToscaCI\Client\ToscaCIClient.exe
          -m distributed
          -c "C:\Tosca_Projects\ToscaCI\Client\EMI.xml"
          -r "C:\Tosca_Projects\Automation\Result.xml"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Unit Test Results
          path: C:\Tosca_Projects\Automation\Result.xml

      - name: Parse summary and insert into Postgres
        id: save_results
        shell: powershell
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Starting parse & DB insert step"

          function Assert-RequiredVar {
            param(
              [string]$Name,
              [string]$Value
            )
            if ([string]::IsNullOrWhiteSpace($Value)) {
              throw "$Name is missing or empty"
            }
          }

          Assert-RequiredVar "DB_HOST" $env:DB_HOST
          Assert-RequiredVar "DB_PORT" $env:DB_PORT
          Assert-RequiredVar "DB_NAME" $env:DB_NAME
          Assert-RequiredVar "DB_USER" $env:DB_USER
          Assert-RequiredVar "DB_PASS" $env:DB_PASS

          $tmpFiles = @()

          function Set-GHAOutputs {
            param($tests, $failures, $errors, $skipped, $pass)
            Add-Content -Path $env:GITHUB_OUTPUT -Value ("TestsRun={0}" -f $tests)
            Add-Content -Path $env:GITHUB_OUTPUT -Value ("Failures={0}" -f $failures)
            Add-Content -Path $env:GITHUB_OUTPUT -Value ("Errors={0}" -f $errors)
            Add-Content -Path $env:GITHUB_OUTPUT -Value ("Skipped={0}" -f $skipped)
            Add-Content -Path $env:GITHUB_OUTPUT -Value ("Pass={0}" -f $pass)
          }

          function Escape-SqlString($s) {
            if ($null -eq $s) { return "NULL" }
            $str = [string]$s
            $str = $str -replace "'", "''"
            return "'" + $str + "'"
          }

          function Format-SqlValue($v) {
            if ($null -eq $v) { return "NULL" }
            try { $typeName = $v.GetType().Name } catch { return Escape-SqlString($v) }
            switch ($typeName) {
              "Int32"   { return $v.ToString() }
              "Int64"   { return $v.ToString() }
              "Double"  { return $v.ToString([System.Globalization.CultureInfo]::InvariantCulture) }
              "Decimal" { return $v.ToString([System.Globalization.CultureInfo]::InvariantCulture) }
              "DateTime"{ return Escape-SqlString($v.ToString("yyyy-MM-dd HH:mm:ss")) }
              Default   { return Escape-SqlString($v) }
            }
          }

          function Quote-Identifier($identifier) {
            $s = [string]$identifier
            if ($s -match '\.') {
              $parts = $s.Split('.')
              return '"' + $parts[0].Trim('"') + '"."' + $parts[1].Trim('"') + '"'
            } else {
              return '"' + $s.Trim('"') + '"'
            }
          }

          function To-BigIntSqlValue($value) {
            if ($null -eq $value) { return "NULL" }
            $s = ([string]$value).Trim()
            if ($s -match '^\d+$') { return $s }
            return "NULL"
          }

          function Find-PSQL {
            $cmd = Get-Command psql -ErrorAction SilentlyContinue
            if ($cmd) { return $cmd.Source }

            $candidates = Get-ChildItem -Path "C:\Program Files\PostgreSQL" -Directory -ErrorAction SilentlyContinue | ForEach-Object {
              Get-ChildItem -Path $_.FullName -Recurse -Filter psql.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName -First 1
            } | Where-Object { $_ }
            if ($candidates) { return $candidates | Select-Object -First 1 }

            $candidates2 = Get-ChildItem -Path "C:\Program Files (x86)\PostgreSQL" -Directory -ErrorAction SilentlyContinue | ForEach-Object {
              Get-ChildItem -Path $_.FullName -Recurse -Filter psql.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName -First 1
            } | Where-Object { $_ }
            if ($candidates2) { return $candidates2 | Select-Object -First 1 }

            return $null
          }

          $resultPath = 'C:\Tosca_Projects\Automation\Result.xml'
          if (-not (Test-Path $resultPath)) {
            Write-Host "Result XML not found at $resultPath"
            Set-GHAOutputs 0 0 0 0 0
            Exit 0
          }

          Write-Host "Parsing result file: $resultPath"

          try {
            [xml]$doc = Get-Content -Path $resultPath -Raw
          } catch {
            Write-Error "Failed to load XML: $_"
            Set-GHAOutputs 0 0 0 0 0
            Exit 3
          }

          $suites = $doc.SelectNodes("//testsuite")
          if (-not $suites -or $suites.Count -eq 0) {
            if ($doc.DocumentElement -and $doc.DocumentElement.Name -eq 'testsuite') {
              $suites = ,$doc.DocumentElement
            } else {
              Write-Host "No <testsuite> elements found in XML."
              Set-GHAOutputs 0 0 0 0 0
              Exit 0
            }
          }

          $totalTests = 0
          $totalFailures = 0
          $totalSkipped = 0
          $totalErrors = 0

          foreach ($ts in $suites) {
            $ts_tests = 0
            $ts_failures = 0
            $ts_skipped = 0
            $ts_errors = 0

            if ($ts.HasAttribute('tests'))   { [int]::TryParse($ts.GetAttribute('tests'),   [ref]$ts_tests)   > $null }
            if ($ts.HasAttribute('failures')) { [int]::TryParse($ts.GetAttribute('failures'), [ref]$ts_failures) > $null }
            if ($ts.HasAttribute('skipped'))  { [int]::TryParse($ts.GetAttribute('skipped'),  [ref]$ts_skipped)  > $null }
            if ($ts.HasAttribute('errors'))   { [int]::TryParse($ts.GetAttribute('errors'),   [ref]$ts_errors)   > $null }

            $totalTests += $ts_tests
            $totalFailures += $ts_failures
            $totalSkipped += $ts_skipped
            $totalErrors += $ts_errors
          }

          $totalPass = $totalTests - $totalFailures - $totalSkipped - $totalErrors
          if ($totalPass -lt 0) { $totalPass = 0 }

          Write-Host "Aggregated: TestsRun=$totalTests Failures=$totalFailures Errors=$totalErrors Skipped=$totalSkipped Pass=$totalPass"
          Set-GHAOutputs $totalTests $totalFailures $totalErrors $totalSkipped $totalPass

          $kpiRows = @()
          $runSeq = 1

          foreach ($ts in $suites) {
            $ts_name = if ($ts.HasAttribute('name')) { $ts.GetAttribute('name') } elseif ($ts.Attributes['name']) { $ts.Attributes['name'].Value } else { $null }
            $ts_tests = 0
            $ts_failures = 0
            $ts_skipped = 0
            $ts_errors = 0

            if ($ts.HasAttribute('tests'))   { [int]::TryParse($ts.GetAttribute('tests'),   [ref]$ts_tests)   > $null }
            if ($ts.HasAttribute('failures')) { [int]::TryParse($ts.GetAttribute('failures'), [ref]$ts_failures) > $null }
            if ($ts.HasAttribute('skipped'))  { [int]::TryParse($ts.GetAttribute('skipped'),  [ref]$ts_skipped)  > $null }
            if ($ts.HasAttribute('errors'))   { [int]::TryParse($ts.GetAttribute('errors'),   [ref]$ts_errors)   > $null }

            $ts_pass = $ts_tests - $ts_failures - $ts_skipped - $ts_errors
            if ($ts_pass -lt 0) { $ts_pass = 0 }

            $testcases = $ts.SelectNodes("testcase")
            if (-not $testcases -or $testcases.Count -eq 0) { $testcases = $ts.SelectNodes(".//testcase") }

            foreach ($tc in $testcases) {
              $tc_name = if ($tc.HasAttribute('name')) { $tc.GetAttribute('name') } elseif ($tc.Attributes['name']) { $tc.Attributes['name'].Value } else { $null }
              $tc_time = if ($tc.HasAttribute('time')) { $tc.GetAttribute('time') } else { $null }

              $tc_log = $null
              if ($tc.HasAttribute('log')) { $tc_log = $tc.GetAttribute('log') }
              if (-not $tc_log) {
                $so = $tc.SelectSingleNode("system-out")
                if ($so -and $so.InnerText) { $tc_log = $so.InnerText }
              }
              if (-not $tc_log) {
                $se = $tc.SelectSingleNode("system-err")
                if ($se -and $se.InnerText) { $tc_log = $se.InnerText }
              }
              if (-not $tc_log) {
                $ln = $tc.SelectSingleNode("log")
                if ($ln -and $ln.InnerText) { $tc_log = $ln.InnerText }
              }

              $tc_time_value = $null
              if ($tc_time -ne $null) {
                $tmpDec = 0
                if ([decimal]::TryParse($tc_time, [ref]$tmpDec)) { $tc_time_value = $tmpDec } else { $tc_time_value = $tc_time }
              }

              $kpiRows += [PSCustomObject]@{
                run_candidate = $runSeq
                feature_name  = $ts_name
                scenario_name = $tc_name
                status        = if ($ts_pass -eq 1) { 'passed' } else { 'failed' }
                error         = $tc_log
                duration      = $tc_time_value
              }

              $runSeq++
            }
          }

          Write-Host ("Collected KPI rows: {0}" -f $kpiRows.Count)

          $psqlPath = Find-PSQL
          if (-not $psqlPath) {
            Write-Error "psql not found on runner. Please install PostgreSQL client or add psql.exe to PATH."
            Exit 20
          }

          $kpiTableName = "emi.aad_automation_kpi_emi"
          $kpiTableSql = Quote-Identifier $kpiTableName

          try {
            Write-Host ("psql found at: {0}" -f $psqlPath)
            $env:PGPASSWORD = $env:DB_PASS

            if ($kpiRows.Count -eq 0) {
              Write-Host "No KPI rows were created. Nothing to insert."
              Exit 0
            }

            $kpiTuplesForSql = @()
            foreach ($kr in $kpiRows) {
              $ridSql = To-BigIntSqlValue $kr.run_candidate
              $fNm  = Escape-SqlString($kr.feature_name)
              $sNm  = Escape-SqlString($kr.scenario_name)
              $st   = Escape-SqlString($kr.status)
              $err  = Escape-SqlString($kr.error)
              $dur  = Format-SqlValue($kr.duration)

              $kpiTuplesForSql += "(" + ($ridSql + ", " + $fNm + ", " + $sNm + ", " + $st + ", " + $err + ", " + $dur + ", CURRENT_TIMESTAMP") + ")"
            }

            $kpiColumns = '"Run ID","Feature Name","Scenario Name","Status","Error","Duration","Executed On"'
            $kpiInsertStatement = "INSERT INTO " + $kpiTableSql + " (" + $kpiColumns + ") VALUES `n" + ($kpiTuplesForSql -join ",`n") + ";"

            $kpiTmpFile = Join-Path -Path $env:TEMP -ChildPath ("tmp_kpi_insert_{0}.sql" -f ([Guid]::NewGuid().ToString()))
            $kpiInsertStatement | Out-File -FilePath $kpiTmpFile -Encoding utf8 -Force
            $tmpFiles += $kpiTmpFile

            Write-Host "Prepared KPI SQL at: $kpiTmpFile"
            $preview = Get-Content -Path $kpiTmpFile -Raw
            if ($preview.Length -gt 512) { $preview = $preview.Substring(0,512) + "...(truncated)" }
            Write-Host "KPI SQL preview (first 512 chars):"
            Write-Host $preview

            Write-Host "Executing KPI insert..."
            & $psqlPath -h $env:DB_HOST -p $env:DB_PORT -U $env:DB_USER -d $env:DB_NAME -v ON_ERROR_STOP=1 -f $kpiTmpFile
            if ($LASTEXITCODE -ne 0) {
              Write-Error "KPI insert returned exit code $LASTEXITCODE"
              if (Test-Path -LiteralPath $kpiTmpFile) {
                Get-Content -Path $kpiTmpFile | ForEach-Object { Write-Host $_ }
              }
              Exit $LASTEXITCODE
            }

            Write-Host "KPI rows inserted successfully."
            Exit 0
          } finally {
            foreach ($f in $tmpFiles) {
              if ($f -and (Test-Path -LiteralPath $f)) {
                Remove-Item -LiteralPath $f -Force -ErrorAction SilentlyContinue
              }
            }
          }
